<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="confirm-payment.component.scss">
  <link rel="shortcut icon" href="../../assets/favicon.ico" type="image/x-icon">
  <title>Pizzaria Flow</title>
</head>




<body>
    <header>
      <div class="interface">
        <div class="logo">
          <a routerLink="#">
            <img src="../../assets/logo.jpg" alt="Logo Pizzaria" width="200px">
          </a>
        </div>
      </div>
     </header>


    <main>
      <section class="forma-pagamento">
        <h2>Selecione a forma de Pagamento</h2>
        <p>Escolha a opção que melhor lhe convém para finalizar seu pedido. <br>Lembrando que o pagamento é realizado somente na entrega.</p>
        <form action="#">
          <div class="form-group">
            <label for="payment-method">Forma de pagamento:</label>
            <select id="payment-method" name="payment-method" required>
              <option value="cartao-credito">Cartão de crédito</option>
              <option value="cartao-debito">Cartão de débito</option>
              <option value="pix">PIX</option>
              <option value="boleto">Boleto Bancário</option>
              <option value="paypal">PayPal</option>
              <option value="dinheiro">Dinheiro na entrega</option>
            </select>

            <div class="confirm">
              <a routerLink="/confirm-order"><button><a>Confirmar</a></button></a>
            </div>

          </div>
        </form>
      </section>
    </main>

</body>
</html>
