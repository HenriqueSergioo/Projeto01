
<header class="main-header">
  <div class="logo">
    <img src="../../assets/logopchouse2-removebg-preview.png" alt="Logo da Loja de Hardware">
  </div>
  <button class="cart-icon" (click)="toggleCarrinho()">
    <i class="fas fa-shopping-cart"></i>
    <span *ngIf="carrinho.length > 0" class="cart-badge">{{ carrinho.length }}</span>
  </button>
</header>


<app-side-nav></app-side-nav>


  <main>

    <div class="menu">
      <div *ngFor="let produto of produtos" class="card">
        <img [src]="produto.imagem" [alt]="produto.nome">
        <div class="text-content">
          <h2>{{ produto.nome }}</h2>
          <p class="price">R$ {{ produto.preco | number: '1.2-2' }}</p>
          <button (click)="adicionarAoCarrinho(produto)">Adicionar ao Carrinho</button>
        </div>
      </div>
    </div>

    <!-- Modal do Carrinho -->
    <div class="carrinho-modal" *ngIf="carrinhoAberto">
      <div class="carrinho-content">
        <h2>Carrinho de Compras</h2>
        <ul>
          <li *ngFor="let item of carrinho" class="item-carrinho">
            <span>{{ item.nome }}</span>
            <div class="quantidade">
              <button (click)="removerDoCarrinho(item)">-</button>
              <span>{{ item.quantidade }}</span>
              <button (click)="adicionarAoCarrinho(item)">+</button>
            </div>
            <span>R$ {{ (item.preco * item.quantidade) | number: '1.2-2' }}</span>
          </li>
        </ul>
        <p id="total">Total: R$ {{ calcularTotal() | number: '1.2-2' }}</p>
        <button [disabled]="carrinho.length === 0" routerLink="/confirm-payment">Confirmar pedido</button>
        <button class="close-modal" (click)="toggleCarrinho()">Fechar</button>
      </div>
    </div>
  </main>
