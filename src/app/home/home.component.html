
<meta charset="UTF-8">


    <!-- GOOGLE FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- FIM GOOGLE FONTES -->


  <header>
      <div class="interface">
          <div class="logo">
              <a href="#">
                 <img src="../../assets/logopchouse2-removebg-preview.png" alt="Logo Pizzaria" width="220px">
              </a>
          </div><!--logotipo-->
          <nav class="hardware">
              <ul>
                  <li><a routerLink="/login">Sign In</a></li>
              </ul>
          </nav>

      </div> <!--interface-->

  </header>
  <main>
      <section class="topo-do-site">
          <div class="interface2">
             <div class="flex">
              <div class="txt-topo-site">
                      <div class="form">
                        <form (ngSubmit)="onCardapioClick()" #form="ngForm">
                          <div class="input-group">
                            <div class="input-box">
                              <h1>Sign Up</h1>

                              <div class="input-box">
                                <label for="email">Username</label>
                                <input id="email" [(ngModel)]="User" name="User" type="text" placeholder="Username" required>
                              </div>
                            <div class="input-box">
                              <label for="email">E-mail</label>
                              <input id="email" [(ngModel)]="email" name="email" type="text" placeholder="Digite seu email" required>
                            </div>

                            <div class="input-box">
                              <label for="password">Password</label>
                              <input id="password" [(ngModel)]="password" name="password" type="password" placeholder="Crie sua Senha" required>
                            </div>
                          </div>
                          <div class="login-button">
                            <button type="submit">Sign Up</button>
                          </div>
                          </div>
                        </form>
                      </div>
              </div> <!--txt-topo-site-->
             </div> <!--flex-->
          </div> <!--interface-->
      </section> <!--topo-do-site-->
  </main>
